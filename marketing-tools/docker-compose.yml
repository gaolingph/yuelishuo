# ─── 乐说邦客户服务系统 · Docker Compose ───
# 生产环境部署配置
#
# 使用方法：
#   1. 复制 .env 并修改配置
#   2. docker compose up -d
#   3. docker compose logs -f    # 查看日志
#
# 迁移数据库：
#   docker compose exec backend alembic upgrade head
#   或首次初始化：
#   docker compose exec backend python backend/init_db.py

version: "3.8"

services:
  # ─── PostgreSQL 数据库 ───
  postgres:
    image: postgres:16-alpine
    container_name: leshuobang-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: marketing_tools
      POSTGRES_USER: leshuobang
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Chang3MeN0w!}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leshuobang -d marketing_tools"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 缓存 ───
  redis:
    image: redis:7-alpine
    container_name: leshuobang-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── FastAPI 后端 ───
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: leshuobang-backend:latest
    container_name: leshuobang-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # 容器内覆盖数据库和Redis连接
      DATABASE_URL: postgresql://leshuobang:${POSTGRES_PASSWORD:-Chang3MeN0w!}@postgres:5432/marketing_tools
      REDIS_URL: redis://redis:6379/0
      HOST: "0.0.0.0"
      PORT: "8080"
      DEBUG: "false"
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Nginx 反向代理（生产环境） ───
  nginx:
    image: nginx:alpine
    container_name: leshuobang-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      # SSL 证书（使用 certbot 或手动放置）
      - ./nginx/ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
